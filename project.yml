name: FishNShips
options:
  bundleIdPrefix: com.fishnships
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  FishNShips:
    type: application
    platform: iOS
    sources:
      - path: FishNShips/App
        group: App
      - path: FishNShips/Models
        group: Models
      - path: FishNShips/ViewModels
        group: ViewModels
      - path: FishNShips/Views
        group: Views
      - path: FishNShips/Scene
        group: Scene
    resources:
      - path: FishNShips/Assets.xcassets
    dependencies:
      - sdk: SpriteKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fishnships.FishNShips

  FishNShipsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FishNShipsTests/Models
        group: Models
      - path: FishNShipsTests/ViewModels
        group: ViewModels
    dependencies:
      - target: FishNShips
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fishnships.FishNShipsTests
